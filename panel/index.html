<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luna Core — Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--violet:#6d5bf5;--electric:#2f6bff;--cyan:#15c8e0;--ink:#0b1024;--ink2:#283154;--muted:#5b6485;--faint:#8a92ad;
  --page:#f6f8fd;--surf:#fff;--surf2:#f1f4fc;--border:#e6eaf4;--border2:#d6dcee;
  --grad:linear-gradient(120deg,var(--electric),var(--violet) 55%,var(--cyan));
  --grad-text:linear-gradient(120deg,#3a5fe0,#6d5bf5 52%,#0fb6cf);--radius:18px;--ease:cubic-bezier(.22,.61,.36,1);
  --wa:#0b141a;--wa-in:#1f2c33;--wa-out:#005c4b;--wa-head:#202c33;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--page);color:var(--ink2);-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);letter-spacing:-.02em}
.grad{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hidden{display:none!important}
.logo{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--grad);color:#fff;font-family:'Plus Jakarta Sans';font-weight:800;box-shadow:0 8px 20px -8px rgba(109,91,245,.8)}
.btn{font-family:inherit;font-weight:600;font-size:.92rem;border:0;border-radius:50px;padding:.7rem 1.3rem;cursor:pointer;transition:all .2s var(--ease)}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 12px 26px -12px rgba(47,107,255,.6)}.btn-p:hover{transform:translateY(-2px)}
.btn-g{background:#fff;color:var(--ink);border:1px solid var(--border2)}.btn-g:hover{border-color:var(--violet)}
.btn:disabled{opacity:.5;cursor:default;transform:none}
input,select{width:100%;padding:.7rem .85rem;border:1px solid var(--border2);border-radius:10px;font-family:inherit;font-size:.92rem;background:var(--surf2);color:var(--ink);outline:none}
input:focus,select:focus{background:#fff;border-color:var(--violet);box-shadow:0 0 0 3px rgba(109,91,245,.16)}
label{font-size:.8rem;font-weight:600;color:var(--ink2);margin-bottom:.35rem;display:block}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 18px 44px -26px rgba(28,40,95,.3)}

/* AUTH */
#auth{min-height:100vh;display:grid;place-items:center;padding:1.5rem;
  background:radial-gradient(60rem 30rem at 50% -10%,rgba(109,91,245,.14),transparent 70%)}
.auth-box{width:100%;max-width:400px;padding:2rem}
.auth-head{text-align:center;margin-bottom:1.4rem}
.auth-head .logo{margin:0 auto .8rem}
.auth-head h1{font-size:1.4rem}.auth-head p{color:var(--muted);font-size:.9rem;margin-top:.2rem}
.tabs{display:flex;background:var(--surf2);border-radius:50px;padding:4px;margin-bottom:1.3rem}
.tab{flex:1;text-align:center;padding:.55rem;border-radius:50px;font-weight:600;font-size:.88rem;cursor:pointer;color:var(--muted);border:0;background:none;font-family:inherit}
.tab.active{background:#fff;color:var(--ink);box-shadow:0 2px 8px -4px rgba(20,32,80,.2)}
.fg{margin-bottom:.9rem}
.msg{font-size:.84rem;padding:.6rem .8rem;border-radius:10px;margin-bottom:.9rem}
.msg.err{background:#fdecec;color:#c0392b;border:1px solid #f5c6c6}
.api-row{margin-top:1rem;font-size:.72rem;color:var(--faint);text-align:center}
.api-row input{display:inline-block;width:auto;padding:.2rem .4rem;font-size:.72rem;border-radius:6px}

/* APP */
#app{max-width:1080px;margin:0 auto;padding:0 1.25rem}
.top{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;border-bottom:1px solid var(--border);margin-bottom:1.6rem}
.top .brand{display:flex;align-items:center;gap:.6rem}
.top .brand b{font-family:'Plus Jakarta Sans';font-weight:700;font-size:1.05rem;color:var(--ink)}
.top .who{font-size:.78rem;color:var(--muted)}
.grid{display:grid;grid-template-columns:340px 1fr;gap:1.4rem;align-items:start;padding-bottom:3rem}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.pad{padding:1.4rem}
.kpi-big{font-family:'Plus Jakarta Sans';font-weight:800;font-size:2rem;line-height:1}
.bar{height:8px;border-radius:50px;background:var(--surf2);overflow:hidden;margin:.7rem 0 .3rem}
.bar i{display:block;height:100%;background:var(--grad);border-radius:50px;transition:width .5s var(--ease)}
.pill{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:700;color:#5a47e6;background:rgba(109,91,245,.1);border:1px solid rgba(109,91,245,.22);padding:.25rem .7rem;border-radius:50px}
.row{display:flex;justify-content:space-between;font-size:.86rem;padding:.4rem 0;border-bottom:1px solid var(--border)}
.row b{color:var(--ink)}

/* chat */
.chat-card{display:flex;flex-direction:column;height:560px;overflow:hidden;padding:0}
.chat-head{background:var(--wa-head);color:#e9edef;padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem}
.chat-av{width:34px;height:34px;border-radius:50%;background:var(--grad);display:grid;place-items:center;color:#fff;font-family:'Plus Jakarta Sans';font-weight:800}
.chat-body{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem;background:#0b141a}
.b{max-width:80%;padding:.5rem .7rem;border-radius:10px;font-size:.86rem;color:#e9edef;white-space:pre-wrap;animation:pop .2s}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.b.in{align-self:flex-start;background:var(--wa-in);border-top-left-radius:2px}
.b.out{align-self:flex-end;background:var(--wa-out);border-top-right-radius:2px}
.chat-in{display:flex;gap:.5rem;padding:.7rem;background:var(--wa-head)}
.chat-in input{background:#2a3942;border:0;color:#e9edef;border-radius:18px}
.send{width:42px;height:42px;border-radius:50%;border:0;background:var(--grad);color:#fff;cursor:pointer;flex-shrink:0}
/* modal */
.modal{position:fixed;inset:0;background:rgba(8,12,28,.6);backdrop-filter:blur(4px);display:grid;place-items:center;padding:1.5rem;z-index:50}
.modal .card{max-width:520px;width:100%;padding:1.6rem}
.plans{display:grid;gap:.7rem;margin:1rem 0}
.plan{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1rem;border:1px solid var(--border);border-radius:12px}
.plan b{font-family:'Plus Jakarta Sans'}
.plan .pr{font-weight:800;color:var(--ink);font-family:'Plus Jakarta Sans'}
</style>
</head>
<body>

<!-- ░░ AUTH ░░ -->
<div id="auth">
  <div class="card auth-box">
    <div class="auth-head">
      <div class="logo">L</div>
      <h1>Luna <span class="grad">Core</span></h1>
      <p>Tu panel de empleados digitales</p>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Ingresar</button>
      <button class="tab" id="tabReg" onclick="switchTab('reg')">Crear cuenta</button>
    </div>
    <div id="authMsg" class="msg err hidden"></div>

    <div id="formLogin">
      <div class="fg"><label>Email</label><input id="lEmail" type="email" placeholder="tu@negocio.com"></div>
      <div class="fg"><label>Contraseña</label><input id="lPass" type="password" placeholder="••••••••"></div>
      <button class="btn btn-p" style="width:100%" onclick="login()">Ingresar →</button>
    </div>

    <div id="formReg" class="hidden">
      <div class="fg"><label>Nombre del negocio</label><input id="rNombre" placeholder="Clínica Sonríe"></div>
      <div class="fg"><label>Rubro</label>
        <select id="rRubro">
          <option value="estetica">Clínica estética</option>
          <option value="dental">Clínica dental</option>
          <option value="inmobiliaria">Inmobiliaria</option>
          <option value="gimnasio">Gimnasio</option>
          <option value="restaurante">Restaurante</option>
          <option value="veterinaria">Veterinaria</option>
        </select>
      </div>
      <div class="fg"><label>Email</label><input id="rEmail" type="email" placeholder="tu@negocio.com"></div>
      <div class="fg"><label>Contraseña</label><input id="rPass" type="password" placeholder="mínimo 6 caracteres"></div>
      <button class="btn btn-p" style="width:100%" onclick="register()">Crear cuenta gratis →</button>
    </div>

    <div class="api-row">API: <input id="apiUrl" placeholder="http://localhost:5048"></div>
  </div>
</div>

<!-- ░░ APP ░░ -->
<div id="app" class="hidden">
  <div class="top">
    <div class="brand"><div class="logo" style="width:32px;height:32px">L</div><b>Luna Core</b></div>
    <div style="display:flex;align-items:center;gap:1rem">
      <div style="text-align:right"><div id="whoName" style="font-weight:600;font-size:.9rem"></div><div class="who" id="whoEmail"></div></div>
      <button class="btn btn-g" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="grid">
    <div style="display:flex;flex-direction:column;gap:1.4rem">
      <div class="card pad">
        <span class="pill" id="planPill">Plan Free</span>
        <h3 style="margin:.8rem 0 .2rem">Uso de este mes</h3>
        <div class="kpi-big"><span id="usados">0</span> <span style="font-size:1rem;color:var(--muted);font-weight:500">/ <span id="limite">50</span> mensajes</span></div>
        <div class="bar"><i id="barFill" style="width:0%"></i></div>
        <div style="font-size:.78rem;color:var(--faint)" id="restante"></div>
        <button class="btn btn-p" style="width:100%;margin-top:1rem" onclick="openPlans()">Mejorar mi plan</button>
      </div>
      <div class="card pad">
        <h3 style="font-size:1rem;margin-bottom:.6rem">Tu agente</h3>
        <div class="row"><span>Rubro</span><b id="rubroVal">—</b></div>
        <div class="row" style="border:0"><span>Estado</span><b style="color:#0c8f63">● Activo 24/7</b></div>
      </div>
    </div>

    <div class="card chat-card">
      <div class="chat-head"><div class="chat-av">L</div>
        <div><div style="font-weight:600;font-size:.9rem" id="agenteName">Tu agente</div><div style="font-size:.7rem;color:#8aa">prueba a tu recepcionista IA</div></div></div>
      <div class="chat-body" id="chat"></div>
      <div class="chat-in"><input id="chatInput" placeholder="Escribe como un cliente..." onkeydown="if(event.key==='Enter')sendChat()"><button class="send" onclick="sendChat()">➤</button></div>
    </div>
  </div>
</div>

<!-- ░░ MODAL PLANES ░░ -->
<div id="plansModal" class="modal hidden">
  <div class="card">
    <h2 style="font-size:1.3rem">Elige tu plan</h2>
    <p style="color:var(--muted);font-size:.88rem;margin-top:.2rem">Más mensajes, más citas agendadas mientras descansas.</p>
    <div class="plans" id="plansList"></div>
    <div style="display:flex;gap:.6rem;justify-content:flex-end">
      <button class="btn btn-g" onclick="closePlans()">Cerrar</button>
    </div>
  </div>
</div>

<script>
let API = localStorage.getItem('luna_api') || 'http://localhost:5048';
let token = localStorage.getItem('luna_token') || '';
let negocio = JSON.parse(localStorage.getItem('luna_negocio') || 'null');
let messages = [];

document.getElementById('apiUrl').value = API;
document.getElementById('apiUrl').addEventListener('change', e => { API = e.target.value.trim().replace(/\/$/,''); localStorage.setItem('luna_api', API); });

function switchTab(t){
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabReg').classList.toggle('active', t==='reg');
  document.getElementById('formLogin').classList.toggle('hidden', t!=='login');
  document.getElementById('formReg').classList.toggle('hidden', t!=='reg');
  hideMsg();
}
function showMsg(m){const e=document.getElementById('authMsg');e.textContent=m;e.classList.remove('hidden');}
function hideMsg(){document.getElementById('authMsg').classList.add('hidden');}

async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(token) headers['Authorization'] = 'Bearer '+token;
  const res = await fetch(API+path, Object.assign({}, opts, {headers}));
  let data=null; try{ data=await res.json(); }catch{}
  return {res, data};
}

async function register(){
  hideMsg();
  const body = {nombre:rNombre.value, rubro:rRubro.value, email:rEmail.value, password:rPass.value};
  try{
    const {res,data} = await api('/api/auth/register',{method:'POST',body:JSON.stringify(body)});
    if(!res.ok){ showMsg(data?.error||'No se pudo crear la cuenta.'); return; }
    onAuth(data);
  }catch(e){ showMsg('No pude conectar con el servidor ('+API+').'); }
}
async function login(){
  hideMsg();
  try{
    const {res,data} = await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:lEmail.value,password:lPass.value})});
    if(!res.ok){ showMsg(data?.error||'Credenciales inválidas.'); return; }
    onAuth(data);
  }catch(e){ showMsg('No pude conectar con el servidor ('+API+').'); }
}
function onAuth(data){
  token=data.token; negocio=data.negocio;
  localStorage.setItem('luna_token',token); localStorage.setItem('luna_negocio',JSON.stringify(negocio));
  enterApp();
}
function logout(){ token=''; negocio=null; localStorage.removeItem('luna_token'); localStorage.removeItem('luna_negocio');
  document.getElementById('app').classList.add('hidden'); document.getElementById('auth').classList.remove('hidden'); }

const RUBRO_LABEL={estetica:'Clínica estética',dental:'Clínica dental',inmobiliaria:'Inmobiliaria',gimnasio:'Gimnasio',restaurante:'Restaurante',veterinaria:'Veterinaria'};

async function enterApp(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  whoName.textContent = negocio?.nombre || 'Mi negocio';
  whoEmail.textContent = negocio?.email || '';
  rubroVal.textContent = RUBRO_LABEL[negocio?.rubro] || negocio?.rubro || '—';
  agenteName.textContent = 'Agente · '+(RUBRO_LABEL[negocio?.rubro]||'');
  await refreshMe();
  // saludo inicial
  chat.innerHTML=''; messages=[];
  bubble('in','¡Hola! 🌙 Soy tu agente de ventas. Escríbeme como si fueras un cliente y mira cómo respondo, califico y agendo.');
}

async function refreshMe(){
  const {res,data} = await api('/api/me');
  if(!res.ok) return;
  document.getElementById('usados').textContent=data.usados;
  document.getElementById('limite').textContent=data.limite;
  document.getElementById('planPill').textContent='Plan '+(data.plan||'Free');
  const pct = data.limite? Math.min(100, Math.round(data.usados/data.limite*100)) : 0;
  document.getElementById('barFill').style.width=pct+'%';
  document.getElementById('restante').textContent=(data.limite-data.usados)+' mensajes restantes';
}

function bubble(side,text){const d=document.createElement('div');d.className='b '+side;d.textContent=text;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
async function sendChat(){
  const t=chatInput.value.trim(); if(!t) return; chatInput.value='';
  bubble('out',t); messages.push({role:'user',content:t});
  const typing=document.createElement('div');typing.className='b in';typing.textContent='...';chat.appendChild(typing);
  try{
    const {res,data}=await api('/api/chat',{method:'POST',body:JSON.stringify({messages})});
    typing.remove();
    if(res.status===429){ bubble('in','Llegaste al límite de tu plan este mes. Mejora tu plan para seguir 💜'); openPlans(); return; }
    if(!res.ok){ bubble('in', data?.error==='config'?'⚙️ Falta configurar GROQ_API_KEY en el servidor.':'⚠️ No pude responder ahora.'); return; }
    bubble('in',data.reply); messages.push({role:'assistant',content:data.reply});
    refreshMe();
  }catch(e){ typing.remove(); bubble('in','⚠️ Sin conexión con el servidor.'); }
}

async function openPlans(){
  const modal=document.getElementById('plansModal'); modal.classList.remove('hidden');
  const list=document.getElementById('plansList'); list.innerHTML='Cargando...';
  try{
    const {res,data}=await api('/api/plans');
    if(!res.ok){ list.innerHTML='<p style="color:var(--muted)">No se pudieron cargar los planes.</p>'; return; }
    list.innerHTML='';
    data.forEach(p=>{
      const row=document.createElement('div');row.className='plan';
      const precio = p.precioMensual>0? ('S/ '+p.precioMensual+' /mes') : 'Gratis';
      row.innerHTML=`<div><b>${p.nombre}</b><div style="font-size:.78rem;color:var(--muted)">${p.limiteMensajes.toLocaleString()} mensajes/mes</div></div>
        <div style="display:flex;align-items:center;gap:.8rem"><span class="pr">${precio}</span>
        ${p.precioMensual>0?`<button class="btn btn-p" onclick="subscribe(${p.id},'${p.nombre}')">Suscribirme</button>`:'<span style="font-size:.78rem;color:var(--faint)">actual</span>'}</div>`;
      list.appendChild(row);
    });
  }catch(e){ list.innerHTML='<p style="color:var(--muted)">Sin conexión.</p>'; }
}
function closePlans(){ document.getElementById('plansModal').classList.add('hidden'); }
async function subscribe(planId,nombre){
  try{
    const {res,data}=await api('/api/billing/checkout',{method:'POST',body:JSON.stringify({planId,gateway:'mercadopago'})});
    if(res.ok && data?.url){ window.location.href=data.url; return; }
    alert(data?.message || ('Para activar pagos falta configurar las credenciales de MercadoPago en el servidor. (Plan elegido: '+nombre+')'));
  }catch(e){ alert('Sin conexión con el servidor.'); }
}

// auto-login si hay token
if(token && negocio){ enterApp(); }
</script>
</body>
</html>
